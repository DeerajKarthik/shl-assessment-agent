<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHL Recommender Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: rgba(30, 41, 59, 0.7);
            --user-bubble: #3b82f6;
            --ai-bubble: rgba(51, 65, 85, 0.8);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #60a5fa;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: var(--chat-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .header-text h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .header-text p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .chat-history {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.3s ease-out forwards;
        }

        .message-wrapper.user {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message-wrapper.ai {
            align-self: flex-start;
        }

        .message {
            padding: 15px 20px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .user .message {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
        }

        .ai .message {
            background: var(--ai-bubble);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }

        .recommendations {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .rec-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s, background 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .rec-card:hover {
            transform: translateY(-2px);
            background: rgba(30, 41, 59, 0.9);
            border-color: var(--accent);
        }

        .rec-info h4 {
            font-size: 0.95rem;
            margin-bottom: 4px;
            color: var(--accent);
        }

        .rec-info span {
            font-size: 0.75rem;
            background: rgba(96, 165, 250, 0.1);
            color: var(--accent);
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 500;
        }

        .input-area {
            padding: 20px 30px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 15px;
            background: rgba(15, 23, 42, 0.4);
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--border);
            padding: 16px 20px;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent);
        }

        input::placeholder {
            color: var(--text-secondary);
        }

        button {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: transform 0.2s, opacity 0.2s;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        button:hover {
            transform: scale(1.05);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: none;
            padding: 15px 20px;
            background: var(--ai-bubble);
            border-radius: 20px;
            border-bottom-left-radius: 4px;
            width: fit-content;
            border: 1px solid var(--border);
        }

        .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            margin: 0 3px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="header">
            <div class="header-icon"><i class="fa-solid fa-brain"></i></div>
            <div class="header-text">
                <h1>SHL Agent</h1>
                <p>Assessment Recommender AI</p>
            </div>
        </div>

        <div class="chat-history" id="chatHistory">
            <!-- Messages go here -->
            <div class="message-wrapper ai">
                <div class="message">
                    Hello! I'm the SHL Assessment Recommender. Tell me about the role you are hiring for, and I'll find the best assessments from our catalog.
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="E.g. I need to hire a Senior Java Engineer..." autocomplete="off">
            </div>
            <button id="sendBtn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const state = {
            messages: []
        };

        const chatHistory = document.getElementById('chatHistory');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function createTypingIndicator() {
            const div = document.createElement('div');
            div.className = 'message-wrapper ai';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="typing-indicator" style="display: block;">
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            `;
            return div;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Add user message to UI
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            const userMsg = document.createElement('div');
            userMsg.className = 'message-wrapper user';
            userMsg.innerHTML = `<div class="message">${escapeHTML(text)}</div>`;
            chatHistory.appendChild(userMsg);

            // 2. Add to internal state
            state.messages.push({ role: "user", content: text });

            // 3. Show typing indicator
            const typing = createTypingIndicator();
            chatHistory.appendChild(typing);
            chatHistory.scrollTop = chatHistory.scrollHeight;

            try {
                // 4. Call API
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: state.messages })
                });
                
                const data = await response.json();
                const provider = response.headers.get('X-Model-Provider') || 'Deterministic';
                
                // Remove typing indicator
                typing.remove();

                // 5. Add AI response to state
                state.messages.push({ role: "assistant", content: data.reply });

                // 6. Build AI UI
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message-wrapper ai';
                
                let innerHTML = `
                    <div style="font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 4px; margin-left: 5px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;">
                        <i class="fa-solid fa-microchip" style="margin-right: 4px;"></i>${escapeHTML(provider)}
                    </div>
                    <div class="message">${escapeHTML(data.reply)}</div>
                `;
                
                // Add recommendations if present
                if (data.recommendations && data.recommendations.length > 0) {
                    let recsHTML = '<div class="recommendations">';
                    data.recommendations.forEach(rec => {
                        recsHTML += `
                            <a href="${rec.url}" target="_blank" class="rec-card">
                                <div class="rec-info">
                                    <h4>${escapeHTML(rec.name)}</h4>
                                    <span>Type: ${escapeHTML(rec.test_type)}</span>
                                </div>
                                <i class="fa-solid fa-arrow-up-right-from-square" style="color: var(--text-secondary); font-size: 0.8rem;"></i>
                            </a>
                        `;
                    });
                    recsHTML += '</div>';
                    innerHTML += recsHTML;
                }

                if (data.end_of_conversation) {
                    innerHTML += `<div style="margin-top: 15px; font-size: 0.8rem; color: var(--text-secondary); text-align: center;">Session Ended by AI Constraint (8 turns max)</div>`;
                    userInput.placeholder = "Conversation has ended.";
                } else {
                    userInput.disabled = false;
                    sendBtn.disabled = false;
                    userInput.focus();
                }

                aiMsg.innerHTML = innerHTML;
                chatHistory.appendChild(aiMsg);
                chatHistory.scrollTop = chatHistory.scrollHeight;

            } catch (error) {
                typing.remove();
                alert('Error connecting to the API.');
                userInput.disabled = false;
                sendBtn.disabled = false;
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag])
            );
        }
    </script>
</body>
</html>
